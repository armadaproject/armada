{{- if .Values.prometheus.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "executor.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "executor.labels.all" . | nindent 4 }}
    {{- if .Values.prometheus.labels }}
    {{- toYaml .Values.prometheus.labels | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: armada-executor-metrics
      interval: {{ .Values.prometheus.scrapeInterval }}
      rules:
        - record: armada:executor:rest:request:histogram95
          labels:
            namespace: "{{ .Release.Namespace }}"
          expr: histogram_quantile(0.95, sum(rate(rest_client_request_duration_seconds_bucket{service="{{ include "executor.name" . }}",namespace="{{ .Release.Namespace }}"}[2m])) by (endpoint, verb, url, le))

        - record: armada:executor:log:rate
          labels:
            namespace: "{{ .Release.Namespace }}"
          expr: sum(rate(log_messages{namespace="{{ .Release.Namespace }}"}[2m])) by (level)
{{- end }}
