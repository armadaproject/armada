# Demo: job stuck in Pending due to unschedulable resource request.
# Requests 5 CPU - fits within queue limit but exceeds any single node's allocatable capacity.
# Armada scheduler holds job in queue; no K8s pod is created.
# Use: armadactl native-describe pod <job-id>  (shows job queued, no run assigned)
queue: example
jobSetId: demo-pending-resources
jobs:
  - namespace: default
    priority: 0
    podSpec:
      terminationGracePeriodSeconds: 0
      restartPolicy: Never
      containers:
        - name: pending-resources
          image: alpine:latest
          command:
            - sh
          args:
            - -c
            - echo "this should never run"
          resources:
            limits:
              memory: 128Mi
              cpu: "5"
            requests:
              memory: 128Mi
              cpu: "5"
