# Demo: job stuck in Pending due to unschedulable resource request.
# Requests 500 CPU - far beyond any node's allocatable capacity.
# Pod events will show: FailedScheduling: Insufficient cpu
# Use: armadactl kube-describe pod <job-id> --include-events
#      armadactl kube-describe node <job-id>  (shows real allocatable CPU)
queue: example
jobSetId: demo-pending-resources
jobs:
  - namespace: default
    priority: 0
    podSpec:
      terminationGracePeriodSeconds: 0
      restartPolicy: Never
      containers:
        - name: pending-resources
          image: alpine:latest
          command:
            - sh
          args:
            - -c
            - echo "this should never run"
          resources:
            limits:
              memory: 128Mi
              cpu: "500"
            requests:
              memory: 128Mi
              cpu: "500"
