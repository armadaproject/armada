pull_request_rules:
  - name: Require approval from Armada maintainers
    conditions:
      - "#approved-reviews-by>=1"
    actions:
      post_check:
        success_conditions:
          - or:
              - "#approved-reviews-by>=2"
              - and:
                  - "#approved-reviews-by>=1"
                  - "author~=^(d80tb7|dave[-]gantenbein|dejanzele|eleanorpratt|geaere|JamesMurkin|mauriceyap|masipauskas|MustafaI|zuqq|richscott|robertdavidsmith|samclark|suprjinx|EnricoMi|nikola-jokic|j8169|sarhiri|tgucks|dslear|d2burkhalter|ianhockett|Sigele|williamvega|YHines004)$"
        title: Two approvals required, or one if author is a maintainer.
