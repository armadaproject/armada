httpPort: 8084
grpcPort: 50053
metricsPort: 9007
observability:
  enabled: true
  exporter:
    endpoint: "http://localhost:4318"
    protocol: "http/protobuf"
  traces:
    sampler: "parent_based_trace_id_ratio"
    samplerArg: 1.0
application:
  clusterId: local-cluster
kubernetes:
  impersonateUsers: true
