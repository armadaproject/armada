apiPort: 8089
metricsPort: 9003
observability:
  enabled: true
  exporter:
    endpoint: "http://localhost:4318"
    protocol: "http/protobuf"
  traces:
    sampler: "parent_based_trace_id_ratio"
    samplerArg: 1.0
corsAllowedOrigins:
  - "http://localhost:3000"
  - "http://localhost:8089"
  - "http://localhost:10000"
  - "http://localhost:8081"
auth:
  anonymousAuth: true
postgres:
  connection:
    host: localhost
    port: 5432
    user: postgres
    password: psw
    dbname: lookout
    sslmode: disable
uiConfig:
  backend: "jsonb"
  armadaApiBaseUrl: "http://localhost:8081"
  binocularsBaseUrlPattern: "http://localhost:8084"
  customTitle: "Armada Local Dev"
  userAnnotationPrefix: "armadaproject.io/"
