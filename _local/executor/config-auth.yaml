httpPort: 8082
executorApiConnection:
  armadaUrl: "localhost:50052"
  forceNoTls: true
  openIdClientCredentialsAuth:
    providerUrl: "http://localhost:8180/realms/armada"
    clientId: "armada-executor"
    clientSecret: "executor-secret"
    scopes: ["profile", "email"]
metric:
  port: 9002
application:
  clusterId: "local-cluster"
  pool: "default"
  enableJobErrorCategorization: true
  errorCategories:
    defaultCategory: uncategorized
    categories:
      - name: oom
        rules:
          - onConditions: ["OOMKilled"]
      - name: user_error
        rules:
          - onExitCodes:
              operator: In
              values: [1, 2, 126, 127]