httpPort: 8082
executorApiConnection:
  armadaUrl: "localhost:50052"
  forceNoTls: true
metric:
  port: 9002
application:
  clusterId: "local-cluster"
  pool: "default"
  errorCategories:
    categories:
      - name: oom
        rules:
          - onConditions: ["OOMKilled"]
      - name: user_error
        rules:
          - onExitCodes:
              operator: In
              values: [1, 2, 126, 127]
