queue: e2e-test-queue-active
numBatches: 1
batchSize: 1
jobs:
  - priority: 0
    namespace: personal-anonymous
    podSpec:
      terminationGracePeriodSeconds: 0
      restartPolicy: Never
      containers:
        - name: sleep
          imagePullPolicy: IfNotPresent
          image: alpine:3.20.0
          args:
            - "sleep"
            - "30"
          resources:
            limits:
              memory: 25Mi
              cpu: 100m
            requests:
              memory: 25Mi
              cpu: 100m
---
timeout: "120s"
expectedEvents:
  - submitted:
  - running:
queueConfig:
  setup:
    create: true
    randomSuffix: true
  assertions:
    - activeInPool: "default"
    - deleted: true
