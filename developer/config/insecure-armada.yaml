auth:
  basicAuth:
    enableAuthentication: false
  anonymousAuth: true
  permissionGroupMapping:
    submit_any_jobs: ["everyone"]
    create_queue: ["everyone"]
    delete_queue: ["everyone"]
    cordon_queue: ["everyone"]
    cancel_any_jobs: ["everyone"]
    reprioritize_any_jobs: ["everyone"]
    preempt_any_jobs: ["everyone"]
    watch_all_events: ["everyone"]
    execute_jobs: ["everyone"]
    update_executor_settings: ["everyone"]

# Scheduler-specific config (ignored by other components)
scheduling:
  retryPolicy:
    enabled: true
    globalMaxRetries: 5
    default:
      retryLimit: 3
      rules: []  # No rules = failures fail immediately
    policies:
      retry-all:
        retryLimit: 3
        rules:
          - action: Retry
            onExitCodes:
              operator: In
              values: [42]
          - action: Retry
            onConditions: [OOMKilled]
          - action: Retry
            onTerminationMessage:
              pattern: ".*TRANSIENT.*"
