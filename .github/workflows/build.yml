name: Build

on:
  workflow_call:

jobs:
  prepare:
    runs-on: ubuntu-latest-16-cores
    if: github.repository_owner == 'armadaproject'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: prepare

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.8.1
          args: release  --snapshot --skip=sbom,sign --clean
        env:
          DOCKER_REPO: "gresearch"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          DOCKER_BUILDX_BUILDER: "${{ steps.buildx.outputs.name }}"

      - name: Output full commit sha
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/patch/v')) }}
        run: echo "sha_full=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Save Docker image tarballs
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/patch/v')) }}
        run: |
          scripts/docker-save.sh -t ${{ env.sha_full }} -o /tmp/imgs

      - name: Save Docker image tarballs as artifacts
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/patch/v')) }}
        uses: actions/upload-artifact@v6
        with:
          name: armada-image-tarballs
          path: /tmp/imgs

  pack-nuget:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup the latest .NET 7 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 7.0.x

      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: pack-nuget
          cache-tools: true

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: '23.3'

      - name: Create release tag
        id: create-release-tag
        run: echo "release_tag=$(git describe --tags --always --dirty --match='v*' 2> /dev/null | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Pack dotnet clients
        env:
          RELEASE_TAG: ${{ steps.create-release-tag.outputs.release_tag }}
        run: go run github.com/magefile/mage@v1.15.0 -v packNuget

      - name: Save nupkg artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nupkg-artifacts
          path: |
            ./bin/client/DotNet/ArmadaProject.Io.Client.${{ steps.create-release-tag.outputs.release_tag }}.nupkg

  pack-rust-crate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-pack-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock', '.github/actions/fetch-rust-protos/action.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pack-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch proto dependencies
        uses: ./.github/actions/fetch-rust-protos
        with:
          include-armada-protos: 'true'

      - name: Set crate version from tag
        run: |
          # Strip the leading 'v' and any '-patchN' suffix so patch-release tags
          # (e.g. v1.2.3-patch1) publish as stable semver versions (1.2.3) on crates.io.
          VERSION=$(echo "${GITHUB_REF_NAME#v}" | sed 's/-patch[0-9]*$//')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Derived VERSION '$VERSION' is not a valid semver string"
            exit 1
          fi
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" client/rust/Cargo.toml
          grep -q "^version = \"$VERSION\"" client/rust/Cargo.toml || {
            echo "::error::sed did not update version in Cargo.toml — pattern may not have matched"
            exit 1
          }
          cargo generate-lockfile --manifest-path client/rust/Cargo.toml

      - name: Package crate
        run: cargo package --manifest-path client/rust/Cargo.toml --allow-dirty --verbose

      - name: Save crate artifact
        uses: actions/upload-artifact@v6
        with:
          name: crate-artifact
          path: client/rust/target/package/armada-client-*.crate
          if-no-files-found: error
