name: Rust Client

on:
  push:
    branches:
      - master
    paths:
      - 'client/rust/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/rust-client.yml'

  pull_request:
    branches-ignore:
      - gh-pages
    paths:
      - 'client/rust/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/rust-client.yml'

jobs:
  rust-client-msrv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (MSRV 1.85)
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch proto dependencies
        run: |
          mkdir -p client/rust/proto/k8s.io/api client/rust/proto/k8s.io/apimachinery client/rust/proto/google/api

          git clone --depth=1 --filter=blob:none --sparse --branch v0.32.0 \
            https://github.com/kubernetes/api.git /tmp/k8s-api
          git -C /tmp/k8s-api sparse-checkout set core/v1 networking/v1
          cp -r /tmp/k8s-api/core client/rust/proto/k8s.io/api/
          cp -r /tmp/k8s-api/networking client/rust/proto/k8s.io/api/

          git clone --depth=1 --filter=blob:none --sparse --branch v0.32.0 \
            https://github.com/kubernetes/apimachinery.git /tmp/k8s-apimachinery
          git -C /tmp/k8s-apimachinery sparse-checkout set pkg/api/resource pkg/apis/meta/v1 pkg/runtime pkg/util/intstr
          cp -r /tmp/k8s-apimachinery/pkg client/rust/proto/k8s.io/apimachinery/

          curl -sSfL https://raw.githubusercontent.com/googleapis/googleapis/798823426715215eccca4d7e7ee4c814843045d7/google/api/annotations.proto \
            -o client/rust/proto/google/api/annotations.proto
          curl -sSfL https://raw.githubusercontent.com/googleapis/googleapis/798823426715215eccca4d7e7ee4c814843045d7/google/api/http.proto \
            -o client/rust/proto/google/api/http.proto

          mkdir -p client/rust/proto/pkg/api
          cp pkg/api/submit.proto pkg/api/event.proto pkg/api/job.proto pkg/api/health.proto \
            client/rust/proto/pkg/api/

      - name: Build (MSRV)
        run: cargo build --manifest-path client/rust/Cargo.toml

      - name: Test (MSRV)
        run: cargo test --manifest-path client/rust/Cargo.toml

      - name: Package (verify crate is publishable at MSRV)
        run: cargo package --manifest-path client/rust/Cargo.toml --allow-dirty

  rust-client-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fetch proto dependencies
        run: |
          mkdir -p client/rust/proto/k8s.io/api client/rust/proto/k8s.io/apimachinery client/rust/proto/google/api

          # kubernetes/api — pinned to v0.32.0, sparse clone (only proto directories needed)
          git clone --depth=1 --filter=blob:none --sparse --branch v0.32.0 \
            https://github.com/kubernetes/api.git /tmp/k8s-api
          git -C /tmp/k8s-api sparse-checkout set core/v1 networking/v1
          cp -r /tmp/k8s-api/core client/rust/proto/k8s.io/api/
          cp -r /tmp/k8s-api/networking client/rust/proto/k8s.io/api/

          # kubernetes/apimachinery — pinned to v0.32.0, sparse clone
          git clone --depth=1 --filter=blob:none --sparse --branch v0.32.0 \
            https://github.com/kubernetes/apimachinery.git /tmp/k8s-apimachinery
          git -C /tmp/k8s-apimachinery sparse-checkout set pkg/api/resource pkg/apis/meta/v1 pkg/runtime pkg/util/intstr
          cp -r /tmp/k8s-apimachinery/pkg client/rust/proto/k8s.io/apimachinery/

          # google/api protos — pinned to a specific commit for reproducibility
          curl -sSfL https://raw.githubusercontent.com/googleapis/googleapis/798823426715215eccca4d7e7ee4c814843045d7/google/api/annotations.proto \
            -o client/rust/proto/google/api/annotations.proto
          curl -sSfL https://raw.githubusercontent.com/googleapis/googleapis/798823426715215eccca4d7e7ee4c814843045d7/google/api/http.proto \
            -o client/rust/proto/google/api/http.proto

          # Vendor Armada API protos into proto/pkg/api/ mirroring their import paths,
          # so the published crate is self-contained without depending on monorepo layout.
          mkdir -p client/rust/proto/pkg/api
          cp pkg/api/submit.proto pkg/api/event.proto pkg/api/job.proto pkg/api/health.proto \
            client/rust/proto/pkg/api/

      - name: Check formatting
        run: cargo fmt --manifest-path client/rust/Cargo.toml -- --check

      - name: Build
        run: cargo build --manifest-path client/rust/Cargo.toml

      - name: Test
        run: cargo test --manifest-path client/rust/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path client/rust/Cargo.toml --all-targets -- -D warnings

      - name: Package (verify crate is publishable)
        run: cargo package --manifest-path client/rust/Cargo.toml --allow-dirty
