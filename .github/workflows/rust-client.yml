name: Rust Client

on:
  push:
    branches:
      - master
    paths:
      - 'client/rust/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/rust-client.yml'

  pull_request:
    branches-ignore:
      - gh-pages
    paths:
      - 'client/rust/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/rust-client.yml'

jobs:
  rust-client-msrv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (MSRV 1.85)
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock', '.github/workflows/rust-client.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch proto dependencies
        uses: ./.github/actions/fetch-rust-protos

      - name: Build (MSRV)
        run: cargo build --manifest-path client/rust/Cargo.toml

      - name: Test (MSRV)
        run: cargo test --manifest-path client/rust/Cargo.toml

      - name: Vendor Armada protos for package verification
        uses: ./.github/actions/fetch-rust-protos
        with:
          include-armada-protos: 'true'

      - name: Package (verify crate is publishable at MSRV)
        # Intentionally verifies only the default feature set.
        # If optional features are added in future, consider also running:
        #   cargo package --manifest-path client/rust/Cargo.toml --allow-dirty --all-features
        run: cargo package --manifest-path client/rust/Cargo.toml --allow-dirty --verbose

  rust-client-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock', '.github/workflows/rust-client.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fetch proto dependencies
        uses: ./.github/actions/fetch-rust-protos

      - name: Check formatting
        run: cargo fmt --manifest-path client/rust/Cargo.toml -- --check

      - name: Build
        run: cargo build --manifest-path client/rust/Cargo.toml

      - name: Test
        run: cargo test --manifest-path client/rust/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path client/rust/Cargo.toml --all-targets -- -D warnings

      - name: Vendor Armada protos for package verification
        uses: ./.github/actions/fetch-rust-protos
        with:
          include-armada-protos: 'true'

      - name: Package (verify crate is publishable)
        # Intentionally verifies only the default feature set.
        # If optional features are added in future, consider also running:
        #   cargo package --manifest-path client/rust/Cargo.toml --allow-dirty --all-features
        run: cargo package --manifest-path client/rust/Cargo.toml --allow-dirty --verbose
