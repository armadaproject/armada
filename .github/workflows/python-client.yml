name: Python Client

on:
  push:
    tags:
      - v*
    branches:
      - master
    paths:
      - 'client/python/**'
      - 'build/python-client/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/python-client.yml'
      - 'docs/python_armada_client.md'
      - 'scripts/build-python-client.sh'
      - 'makefile'
      - '.github/workflows/python-tests/*'
      - './magefiles/tests.go'
      - './magefiles/python.go'

  pull_request:
    branches-ignore:
      - gh-pages
    paths:
      - 'client/python/**'
      - 'build/python-client/**'
      - 'pkg/api/*.proto'
      - '.github/workflows/python-client.yml'
      - 'docs/python_armada_client.md'
      - 'scripts/build-python-client.sh'
      - 'makefile'
      - '.github/workflows/python-tests/*'
      - './magefiles/tests.go'
      - './magefiles/python.go'

jobs:
  # Formatting, linting and docs only need to run once. They are pinned to
  # Python 3.12 here rather than repeated across every version in the
  # python-client-tox matrix.
  python-client-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install 'tox>=4,<5'
      - name: Setup Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5
        with:
          daemon-config: '{"features":{"containerd-snapshotter":false}}'
      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: python-client-lint
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # The armada_client package is the generated proto code, so docs autodoc
      # needs it built before it can import the package.
      - run: go run github.com/magefile/mage@v1.17.2 -v buildPython
      - name: Check formatting and lint
        run: tox -e format
        working-directory: client/python
      - name: Verify docs updated if needed
        run: tox -e docs-check
        working-directory: client/python

  python-client-tox:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.12', '3.14' ]
        include:
          - tox-env: 'py310'
            python-version: '3.10'
          - tox-env: 'py312'
            python-version: '3.12'
          - tox-env: 'py314'
            python-version: '3.14'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Setup Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5
        with:
          daemon-config: '{"features":{"containerd-snapshotter":false}}'
      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: python-client-tox
      - uses: ./.github/workflows/python-tests
        with:
          python-version: ${{ matrix.python-version }}
          tox-env: ${{ matrix.tox-env }}
          path: 'client/python'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  python-client-integration-tests:
    if: github.repository_owner == 'armadaproject'
    # As of December 2022, using 8vcpu runners is slower overall,
    # due to longer queue times.
    runs-on: ubuntu-22.04
    env:
      # This variable is picked up by the goreleaser config.
      DOCKER_BUILDX_BUILDER: "builder"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      # Some ubuntu-22.04 runners only have ~17GB free on the root disk, which is
      # less than this job's ~19.5GB peak usage. Remove unused preinstalled
      # toolchains to make room.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false
          swap-storage: false
      - name: Setup Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5
        with:
          daemon-config: '{"features":{"containerd-snapshotter":false}}'
      - run: docker buildx create --name ${DOCKER_BUILDX_BUILDER} --driver docker-container --use
      - run: docker buildx install

      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: python-client-integration-tests
          cache-tools: true

      - name: Setup and run integration tests
        run: |
          # Manually create folders to ensure perms are correct.
          mkdir -p .kube/internal
          mkdir -p .kube/external
          go run github.com/magefile/mage@v1.17.2 -v dev:full
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: go run github.com/magefile/mage@v1.17.2 -v teste2epython
      - name: Disk usage report
        if: always()
        run: |
          df -h /
          docker system df || true
