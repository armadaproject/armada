name: "Python tox tests"
description: "Sets up go environment and runs python unit tests in tox"

inputs:
  path:
    description: "Path to python package root relative to repo root"
    required: true
  python-version:
    description: "Version of python to setup and run tests against"
    required: true
  tox-env:
    description: "Tox environment to use for running the tests"
    required: true
  github-token:
    description: "Token for authenticated github requests"
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    # Tox to run tests; build to build the wheel after tests pass
    - run: pip install 'tox>=4,<5' build twine
      shell: bash
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        version: '23.3'
        repo-token: ${{ inputs.github-token }}
    # Generate the proto files for python, required for later steps
    - run: go run github.com/magefile/mage@v1.17.2 -v buildPython
      shell: bash
    # Formatting, linting and docs are checked once on Python 3.12 by the
    # dedicated *-lint jobs, not per matrix version. This action only runs the
    # version-specific unit tests and wheel build.
    - name: Run tox python ${{ inputs.python-version }} unit tests
      run: tox -e ${{ inputs.tox-env }}
      shell: bash
      working-directory: ${{ inputs.path }}
    - name: Build and verify wheel
      run: |
        python -m build --wheel
        twine check dist/*
      shell: bash
      working-directory: ${{ inputs.path }}
