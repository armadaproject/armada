name: Release Rust Client to crates.io

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-22.04
    environment: crates-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/rust/Cargo.toml', 'client/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: rust-client-release

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap proto dependencies
        run: go run github.com/magefile/mage@v1.15.0 -v BootstrapProto

      - name: Check formatting
        run: cargo fmt --manifest-path client/rust/Cargo.toml -- --check

      - name: Build and generate pre-built proto code
        run: ARMADA_GENERATE=1 cargo build --manifest-path client/rust/Cargo.toml

      - name: Verify generated code is up to date
        run: git diff --exit-code client/rust/src/gen/

      - name: Test
        run: ARMADA_GENERATE=1 cargo test --manifest-path client/rust/Cargo.toml

      - name: Clippy
        run: ARMADA_GENERATE=1 cargo clippy --manifest-path client/rust/Cargo.toml --all-targets -- -D warnings

      - name: Setup trusted publishing credentials
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --manifest-path client/rust/Cargo.toml
