name: Python Airflow Operator

on:
  push:
    tags:
      - v*
    branches:
      - master
    paths:
      - '.github/workflows/airflow-operator.yml'
      - '.github/workflows/python-client.yml'
      - '.github/workflows/python-tests/*'
      - 'build/airflow-operator/**'
      - 'build/python-client/**'
      - 'client/python/**'
      - 'docs/python_airflow_operator.md'
      - 'docs/python_armada_client.md'
      - 'pkg/api/*.proto'
      - 'scripts/build-python-client.sh'
      - 'third_party/airflow/**'
      - './magefiles/tests.go'
      - './magefiles/python.go'

  pull_request:
    branches-ignore:
      - gh-pages
    paths:
      - '.github/workflows/airflow-operator.yml'
      - '.github/workflows/python-client.yml'
      - '.github/workflows/python-tests/*'
      - 'build/airflow-operator/**'
      - 'build/python-client/**'
      - 'client/python/**'
      - 'docs/python_airflow_operator.md'
      - 'docs/python_armada_client.md'
      - 'pkg/api/*.proto'
      - 'scripts/build-python-client.sh'
      - 'third_party/airflow/**'

jobs:
  # Verifies the operator against every supported (Airflow, Python) combination.
  # The airflow-tox job below only resolves Airflow to the top of the range (newest 3.x),
  # so without this grid the 2.x serde / get_current_context paths and the 3.2 airflow.sdk
  # serde path would never be exercised in CI. Python 3.14 is only supported upstream by
  # Airflow 3.2+ (Airflow 2.10.x and 3.1.x cap at Python 3.12), so those (airflow, 3.14)
  # cells are excluded — they would otherwise fail at dependency install. The versions are
  # in the matrix so they appear in the check name (e.g. "airflow-compat (2.10.5, 3.12)").
  airflow-compat:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        airflow: ['2.10.5', '3.1.8', '3.2.1']
        python: ['3.10', '3.12', '3.14']
        exclude:
          - airflow: '2.10.5'
            python: '3.14'
          - airflow: '3.1.8'
            python: '3.14'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: airflow-compat
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Generates the armada_client proto code (typings, *_pb2) that the operator imports.
      # Without this the local client install is incomplete and the tests fail to collect.
      - run: go run github.com/magefile/mage@v1.15.0 -v buildPython
      - name: Run operator tests against Airflow ${{ matrix.airflow }}
        run: third_party/airflow/scripts/run-tests.sh ${{ matrix.airflow }} ${{ matrix.python }}

  airflow-tox:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python: [ '3.10', '3.12', '3.14' ]
        include:
          - tox-env: 'py310'
            python: '3.10'
          - tox-env: 'py312'
            python: '3.12'
          - tox-env: 'py314'
            python: '3.14'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: airflow-tox
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: go run github.com/magefile/mage@v1.15.0 -v airflowOperator
      - uses: ./.github/workflows/python-tests
        with:
          python-version: ${{ matrix.python }}
          tox-env: ${{ matrix.tox-env }}
          path: third_party/airflow
          github-token: ${{secrets.GITHUB_TOKEN}}
  airflow-integration-tests:
    if: github.repository_owner == 'armadaproject'
    # As of December 2022, using 8vcpu runners is slower overall,
    # due to longer queue times.
    runs-on: ubuntu-22.04
    env:
      # This variable is picked up by the goreleaser config.
      DOCKER_BUILDX_BUILDER: "builder"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5
        with:
          daemon-config: '{"features":{"containerd-snapshotter":false}}'
      - run: docker buildx create --name ${DOCKER_BUILDX_BUILDER} --driver docker-container --use
      - run: docker buildx install

      - name: Setup Go
        uses: ./.github/actions/setup-go-cache
        with:
          cache-prefix: airflow-integration-tests
          cache-tools: true

      - name: Setup and run integration tests
        run: |
          # Manually create folders to ensure perms are correct.
          mkdir -p .kube/internal
          mkdir -p .kube/external
          go run github.com/magefile/mage@v1.15.0 -v localdev minimal
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: go run github.com/magefile/mage@v1.15.0 -v teste2eAirflow
