redis:
  addrs:
    - redis:6379
  password: ""
  db: 1
  poolSize: 1000
pulsar:
  URL: pulsar://pulsar:6650
  restURL: "http://localhost:8090"
  jobsetEventsTopic: events
  backoffTime: 1s
  receiverQueueSize: 100
  delayMonitor:
    enabled: false
    interval: 30s
subscriptionName: "events-ingester"
minMessageCompressionSize: 1024
maxOutputMessageSizeBytes: 1048576 #1MB
batchSize: 10000
batchDuration: 100ms
eventRetentionPolicy:
  retentionDuration: 336h
metricsPort: 9001
metrics:
  eventSizeMetricsEnabled: true
  redis:
    enabled: false
    collectionInterval: 15m
    initialCollectionDelayMax: 5m
    topN: 100
    scanBatchSize: 1000
    pipelineBatchSize: 500
    interBatchDelay: 100ms
    memoryUsageSamples: 25
    ## Optional: separate Redis for metrics collection.
    ## Sentinel mode is triggered if masterName is non-empty.
    ## If sentinel mode is enabled, addrs must be sentinel endpoints and readOnly must be true.
    ## The application will fail-fast if the metrics configuration is invalid.
    # connectionInfo:
    #   addrs:
    #     - sentinel-1:26379
    #     - sentinel-2:26379
    #     - sentinel-3:26379
    #   masterName: "mymaster"
    #   readOnly: true
    #   db: 1
    leader:
      mode: "kubernetes"
      leaseLockName: "armada-redis-metrics-leader"
      leaseLockNamespace: "armada" # This must be set so viper allows env vars to overwrite it
      leaseDuration: 15s
      renewDeadline: 10s
      podName: "" # This must be set so viper allows env vars to overwrite it
      retryPeriod: 2s
