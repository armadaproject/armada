syntax = 'proto3';

package api;
option go_package = "github.com/armadaproject/armada/pkg/api";
option csharp_namespace = "ArmadaProject.Io.Api";

import "google/protobuf/duration.proto";
import "pkg/api/submit.proto";
import "pkg/api/event.proto";

// Defines a test case for the Armada test suite.
// Defined as a proto message to enable unmarshalling oneof fields.
message TestSpec {
    // Jobs to submit.
    // The n jobs herein are copied BatchSize times to produce n*BatchSize jobs.
    // A batch of n*BatchSize such jobs are submitted in each API call.
    // NumBatches such batches are submitted in total.
    repeated JobSubmitRequestItem jobs = 1;
    // Events expected in response to submitting each job.
    repeated EventMessage expected_events = 2;
    // Queue to submit jobs to.
    string queue = 3;
    // Job set to submit jobs to.
    string job_set_id = 4;
    // Number of batches of jobs to submit.
    // If 0, will submit forever.
    uint32 num_batches = 5;
    // Number of copies of the provided jobs to submit per batch.
    uint32 batch_size = 6;
    // Time between batches.
    // If 0, jobs are submitted as quickly as possible.
    google.protobuf.Duration interval = 7;
    // Number of seconds to wait for jobs to finish.
    google.protobuf.Duration timeout = 8;
    // Action type for jobs in this spec.
    enum ActionType {
        ACTION_NONE = 0; // No action.
        ACTION_CANCEL = 1; // Cancel jobs.
        ACTION_PREEMPT = 2; // Preempt jobs.
        ACTION_REPRIORITIZE = 3; // Reprioritize jobs.
    }
    ActionType action = 9;
    // Selection method for the action.
    enum SelectionType {
        SELECTION_NO = 0; // No selection (no action).
        SELECTION_BY_ID = 1; // Select jobs individually.
        SELECTION_BY_SET = 2; // Select all jobs in the job set in bulk.
        SELECTION_BY_IDS = 3; // Select all jobs in the job set by multiple ids.
    }
    SelectionType selection = 17;
    // Reason for preempting jobs (if preemption is configured).
    string preempt_reason = 16;
    // New priority to apply when reprioritizing jobs (if reprioritization is configured).
    double new_priority = 15;
    // Test name. Defaults to the filename if not provided.
    string name = 10;
    // Randomize clientId if not provided
    bool random_client_id = 11;
    // Toggle should testsuite scrape Armada Job (pod) logs
    bool get_logs = 12;
    // Value of the environment label set on exported Prometheus metrics.
    string environment = 13;
    // Value of the target label set on exported Prometheus metrics.
    string target = 14;
    // Optional queue lifecycle phases.
    QueueConfig queue_config = 18;
}

// Queue lifecycle configuration for a test.
message QueueConfig {
    QueueSetup setup = 1;
    repeated QueueAssertion assertions = 2;
    QueueTeardown teardown = 3;
    Queue update = 4;
}

// Queue setup to run before job submission.
message QueueSetup {
    // If true, create the queue named by TestSpec.queue before running the test.
    bool create = 1;
    // If true, append a random suffix to TestSpec.queue to avoid name collisions.
    bool random_suffix = 2;
    // Number of batches of queues to create.
    // If 0, defaults to 1.
    uint32 num_batches = 5;
    // Number of queues to create per batch, each named "<queue>-<index>".
    // If 0, defaults to 1. If num_batches == 1 and batch_size == 1, the queue is named exactly TestSpec.queue.
    uint32 batch_size = 6;
    // Time between batches.
    // If 0, queues are created as quickly as possible.
    google.protobuf.Duration interval = 7;
    // Queues to create, as templates. Allows creating queues with varying priority factors,
    // permissions, labels, etc. (anything on api.Queue) in a single test.
    repeated Queue queue_specs = 8;
}

// A single assertion to run against queue state after jobs finish.
message QueueAssertion {
    // If non-empty, assert that TestSpec.queue appears in GetActiveQueues for this pool name.
    string active_in_pool = 1;
    // If non-empty, assert that TestSpec.queue does NOT appear in GetActiveQueues for this pool name.
    string not_active_in_pool = 2;
    // If true, assert that TestSpec.queue appears in the GetQueues streaming response.
    bool appears_in_stream = 3;
    // If set, fetch TestSpec.queue via GetQueue and assert that its properties match this
    // template (name is ignored; compares priority_factor, user_owners, group_owners,
    // permissions, cordoned, labels, and resource_limits_by_priority_class_name).
    // Useful for verifying that a QueueUpdate was actually applied.
    Queue matches = 4;
    // If true, after teardown deletes the queue(s), assert that GetQueue on the deleted
    // queue(s) returns NOT_FOUND.
    bool deleted = 5;
}

// Queue teardown to run after all assertions (always runs, even on test failure).
message QueueTeardown {
    // If true, the queue named by TestSpec.queue is NOT deleted after the test.
    // Queues are deleted by default; set this to opt out.
    bool skip_delete = 1;
    // If true, the delete is expected to return NOT_FOUND (test the error path).
    bool expect_not_found = 2;
}
